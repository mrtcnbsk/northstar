name: "Setup Git Committer"
description: "Configure git user + remote auth using the workflow GITHUB_TOKEN"
# kilocode_change - this fork has no Kilo Maintainer GitHub App, so create-github-app-token
# fails ("appId option is required"). Use the workflow's built-in GITHUB_TOKEN (which has
# `contents: write` per the publish workflow's permissions) with the standard github-actions[bot]
# committer identity. The `kilo-maintainer-app-*` inputs are accepted but ignored.
inputs:
  kilo-maintainer-app-id:
    description: "(unused on this fork) Kilo Maintainer GitHub App ID"
    required: false
  kilo-maintainer-app-secret:
    description: "(unused on this fork) Kilo Maintainer GitHub App private key"
    required: false
outputs:
  token:
    description: "GitHub token used for git push + gh operations"
    value: ${{ github.token }}
  app-slug:
    description: "committer slug"
    value: "github-actions"
runs:
  using: "composite"
  steps:
    - name: Configure git user
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      shell: bash

    - name: Clear checkout auth
      run: |
        git config --local --unset-all http.https://github.com/.extraheader || true
        keys="$(git config --local --name-only --get-regexp '^includeIf\.gitdir:' || true)"
        for key in $keys; do
          path="$(git config --local --get "$key" || true)"
          case "$path" in
            *git-credentials-*.config) git config --local --unset-all "$key" || true ;;
          esac
        done
      shell: bash

    - name: Configure git remote
      run: |
        git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}
      shell: bash
